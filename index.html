<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Niharika ❤️</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="particles"></div>

<div class="container">

    <h1 class="title">
        ❤️ Happy Birthday ❤️
    </h1>

    <h2 class="name">
        Niharika
    </h2>

    <p class="subtitle">
        Every beautiful story has its perfect time...
    </p>

    <div class="glass">

        <h3>This Surprise Unlocks In</h3>

        <div id="countdown">

            <div class="box">
                <span id="days">00</span>
                <small>Days</small>
            </div>

            <div class="box">
                <span id="hours">00</span>
                <small>Hours</small>
            </div>

            <div class="box">
                <span id="minutes">00</span>
                <small>Minutes</small>
            </div>

            <div class="box">
                <span id="seconds">00</span>
                <small>Seconds</small>
            </div>

        </div>

    </div>

    <button id="openBtn" disabled>
        🔒 Locked
    </button>

    <p class="footer">
        Made with ❤️ by Batman
    </p>

</div>

<script src="script.js"></script>

</body>
</html>
