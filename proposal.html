<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Niharika ❤️</title>

<link rel="stylesheet" href="style.css">

<style>

body{body {
    min-height: 100vh;
    min-height: 100dvh;

    background: linear-gradient(
        135deg,
        #ff758c,
        #ff7eb3,
        #667eea
    );

    overflow-x: hidden;
    overflow-y: auto;

    display: block;
    padding: 35px 12px 80px;

    -webkit-overflow-scrolling: touch;
}

}


.birthday{

font-size:55px;

color:white;

margin-bottom:15px;

}


.name{

font-size:45px;

color:#ffe6f0;

}


.crown{

font-size:60px;

animation:bounce 2s infinite;

}


.message{

font-size:22px;

line-height:1.6;

margin:30px 0;

}


.question{

font-size:35px;

font-weight:bold;

}


.buttons{

display:flex;

justify-content:center;

gap:30px;

margin-top:40px;

}


.yes{

background:#ff3366;

}


.no{

background:#444;

position:relative;

}


@keyframes fade{

from{

opacity:0;
transform:translateY(50px);

}

to{

opacity:1;
transform:translateY(0);

}

}


@keyframes bounce{

50%{

transform:translateY(-15px);

}

}


</style>

</head>


<body>


<div id="particles"></div>


<div class="container">


<div class="proposal-box">


<div class="crown">

👑

</div>


<h1 class="birthday">

Happy Birthday

</h1>


<h2 class="name">

Niharika ❤️

</h2>


<p class="message">

From the day you entered my life...

something changed.

Your smile became my happiness,
your voice became my peace,
and your presence became my favourite place.

🥹❤️

</p>


<h2 class="question">

Will you be my wife, Niharika? 💍

</h2>



<div class="buttons">


<button class="yes" onclick="yesClicked()">

YES ❤️

</button>


<button class="no" id="noBtn">

NO 😌

</button>


</div>


</div>


</div>



<script>


// YES BUTTON

function yesClicked(){

alert("You made me the happiest person ❤️🥹");

window.location.href="timeline.html";

}



// NO BUTTON RUN AWAY

const noBtn=document.getElementById("noBtn");


noBtn.addEventListener("mouseover",()=>{


let x=Math.random()*300-150;

let y=Math.random()*200-100;


noBtn.style.transform=
`translate(${x}px,${y}px)`;


});




// Floating Hearts


const particles=document.getElementById("particles");


function heart(){


let h=document.createElement("div");


h.className="heart";

h.innerHTML="❤️";


h.style.left=Math.random()*100+"vw";

h.style.fontSize=
(20+Math.random()*30)+"px";


h.style.animationDuration=
(5+Math.random()*5)+"s";


particles.appendChild(h);



setTimeout(()=>{

h.remove();

},10000);



}


setInterval(heart,300);



</script>


</body>

</html>
